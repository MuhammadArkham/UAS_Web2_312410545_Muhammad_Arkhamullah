<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiLapor - Sistem Pengaduan Masyarakat</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'blob': 'blob 7s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    colors: {
                        primary: '#2563EB',
                        primaryHover: '#1D4ED8',
                        secondary: '#0F172A',
                        background: '#F8FAFC'
                    }
                }
            }
        }
    </script>

    <!-- Vue 3 & Vue Router 4 (CDN) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
    
    <!-- Axios (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Chart.js (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!--
      Catatan Teknis: Blok <style> berikut BUKAN styling UI tradisional.
      Ini adalah konfigurasi wajib untuk Vue 3 Transition System (<transition> component).
      Vue Transition memerlukan class CSS (.fade-enter-active, dll) yang tidak dapat
      digantikan oleh utility class TailwindCSS karena bersifat programatik.
      Seluruh styling UI/visual komponen 100% menggunakan TailwindCSS utility classes.
    -->
    <style>
        .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        
        .fade-in-section {
          opacity: 0;
          transform: translateY(30px);
          visibility: hidden;
          transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0s 0.8s;
          will-change: opacity, visibility;
        }
        .fade-in-section.is-visible {
          opacity: 1;
          transform: none;
          visibility: visible;
          transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0s 0s;
        }
        @keyframes flowLine {
          0% { background-position: 200% 0; }
          100% { background-position: -200% 0; }
        }
        .animate-flow {
          background: linear-gradient(90deg, #f1f5f9 0%, #60a5fa 50%, #f1f5f9 100%);
          background-size: 200% 100%;
          animation: flowLine 2.5s infinite linear;
        }
    </style>

    <!-- Konfigurasi Global Aplikasi -->
    <script>
        window.APP_CONFIG = {
            API_BASE_URL: 'http://localhost/UAS_Web2_312410545_Muhammad_Arkhamullah/backend-api/public/api',
            IMAGE_BASE_URL: 'http://localhost/UAS_Web2_312410545_Muhammad_Arkhamullah/backend-api/public/',
            statusBadgeClass: {
                pending: 'bg-amber-100 text-amber-700',
                diproses: 'bg-blue-100 text-blue-700',
                selesai: 'bg-green-100 text-green-700',
                ditolak: 'bg-gray-100 text-gray-600'
            }
        };
    </script>
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body class="bg-background text-gray-800 antialiased font-sans">
    <div id="app">
        <router-view v-slot="{ Component, route }">
            <transition :name="route.meta.requiresAuth ? '' : 'fade'" mode="out-in">
                <component :is="Component"></component>
            </transition>
        </router-view>
    </div>

    <!-- Components -->
    <script src="components/AdminLayout.js?v=125"></script>
    <script src="components/Home.js?v=125"></script>
    <script src="components/CreateReport.js?v=125"></script>
    <script src="components/Login.js?v=125"></script>
    <script src="components/Dashboard.js?v=125"></script>
    <script src="components/Categories.js?v=125"></script>
    <script src="components/Reports.js?v=125"></script>
    <script src="components/ReportDetail.js?v=125"></script>
    
    <script>
        // Custom Intersection Observer for fade-in-section
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    // Optional: stop observing once visible for better performance
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });

        window.observeFadeSections = function() {
            // Berikan jeda untuk memastikan Vue telah merender elemen DOM
            setTimeout(() => {
                document.querySelectorAll('.fade-in-section').forEach(el => {
                    // Reset visibility status before observing (useful when navigating back)
                    el.classList.remove('is-visible');
                    observer.observe(el);
                });
            }, 50);
        };
    </script>
    
    <!-- App Entry Point -->
    <script src="app.js?v=137"></script>
    <!-- html2pdf for Export PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- AOS Animation JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Init AOS globally, but components can re-init it
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                once: true,
                duration: 800,
                easing: 'ease-out-cubic',
                offset: 50,
            });
        });
    </script>
</body>
</html>
