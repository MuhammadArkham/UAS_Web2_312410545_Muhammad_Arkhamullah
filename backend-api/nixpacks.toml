[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "php82Extensions.mysqli", "php82Extensions.intl", "php82Extensions.mbstring"]

[phases.install]
cmds = [
    "composer install --no-dev",
    "mkdir -p writable/cache writable/logs writable/session writable/uploads",
    "chmod -R 777 writable"
]
